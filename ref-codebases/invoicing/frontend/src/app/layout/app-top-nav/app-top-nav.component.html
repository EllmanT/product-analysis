<header class="app-top-nav">
  <div class="app-top-nav-inner">
    <a routerLink="/dashboard" class="app-top-nav-brand" title="Dashboard">
      <img src="/logo.png" alt="" class="app-top-nav-logo" width="28" height="28" />
      <span class="app-top-nav-title">E-Invoicing</span>
    </a>

    <div class="app-top-nav-actions">
      <button
        #avatarBtn
        type="button"
        class="user-avatar-btn"
        (click)="openUserMenu($event, avatarBtn)"
        aria-haspopup="dialog"
        [attr.aria-label]="'Account menu for ' + displayName()"
      >
        {{ initials() }}
      </button>

      <p-popover #userMenu styleClass="user-menu-popover">
        <div class="user-menu-panel">
          <div class="user-menu-heading">{{ displayName() }}</div>
          <div class="user-menu-list">
            <button type="button" class="user-menu-row" (click)="goGuide()">Guide</button>
            <button type="button" class="user-menu-row" (click)="goHelp()">Help</button>
            <button type="button" class="user-menu-row user-menu-row--logout" (click)="logout()">
              Log out
            </button>
          </div>
        </div>
      </p-popover>
    </div>
  </div>
</header>
